// XSS 방어: innerHTML 데이터 주입 시 HTML escape
const _ESC = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
function esc(s){ return s == null ? '' : String(s).replace(/[&<>"']/g, c => _ESC[c]); }
// URL scheme allowlist: http/https/mailto만 허용. 그 외는 about:blank
function safeUrl(u){
  if (!u) return 'about:blank';
  const s = String(u).trim();
  return /^(https?:|mailto:)/i.test(s) ? s : 'about:blank';
}

  if (p == null) return '-';
  if (p >= 1000) return p.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  if (p >= 100) return p.toFixed(1);
  if (p >= 10) return p.toFixed(2);
  if (p >= 1) return p.toFixed(3);
  return p.toFixed(4);
}

    const sourcesHtml = (f.sources || []).map(([name, url]) =>
      `<a href="${safeUrl(url)}" target="_blank" rel="noopener noreferrer">${esc(name)}↗</a>`
    ).join('');
    const distWarn = f.dist_sum < 100 ?
      `<div class="dist-warn">⚠ 분배 합계 ${f.dist_sum}% (미공시 ${(100-f.dist_sum).toFixed(2)}%)</div>` : '';

    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">
          <h3>${t.symbol} <span style="color:var(--muted);font-weight:400;font-size:14px">${t.korean}</span></h3>
          <div class="kor">${f.category || ''}</div>
          <div class="listing">상장 ${t.listing}</div>
        </div>
        <div class="card-tags">
          ${f.rank != null
            ? `<span class="rank-tag rank-${f.rank}">Codex #${f.rank}</span>`
            : `<span class="rank-tag" style="background:var(--panel-2);color:var(--muted);border:1px solid var(--border)">Codex —</span>`}
          <span class="mom-tag mom-${tagName}">MOMENTUM ${tagName}</span>
          ${f.source_tier != null ? (() => {
            const labels = {1:'★ 1차 출처', 2:'★ 2차 출처', 3:'★ 3차 출처', 0:'⚠ 미검증'};
            return `<span class="tier-badge tier-${f.source_tier}" title="${(f.source_tier_note||'').replace(/"/g,'&quot;')}">${labels[f.source_tier]||'?'}</span>`;
          })() : ''}
        </div>
      </div>
      <div class="meta-strip">
        <div class="meta-cell"><div class="lbl">시총</div><div class="val">${meta.market_cap_usd == null ? '-' : '$' + compactUsd.format(meta.market_cap_usd)}</div></div>
        <div class="meta-cell"><div class="lbl">거래량</div><div class="val">${meta.total_volume_usd == null ? '-' : '$' + compactUsd.format(meta.total_volume_usd)}</div></div>
        <div class="meta-cell"><div class="lbl">유통량</div><div class="val">${meta.circulating_supply == null ? '-' : compactNum.format(meta.circulating_supply)}</div></div>
        <div class="meta-cell expandable" data-key="cex"><div class="lbl">CEX</div><div class="val">${cexHtml}</div></div>
        <div class="meta-cell expandable" data-key="contract"><div class="lbl">컨트랙트</div><div class="val">${contractHtml}</div></div>
        <div class="meta-cell expandable" data-key="dex"><div class="lbl">DEX</div><div class="val">${meta.dex_liquidity_usd == null ? '-' : '$' + compactUsd.format(meta.dex_liquidity_usd)}</div></div>
      </div>
      ${criticalBanner}
      ${f.rank != null
        ? `<div class="rank-reason"><b>Codex #${f.rank}:</b> ${f.rank_reason || ''}</div>`
        : (f.rank_reason ? `<div class="rank-reason"><b>미평가:</b> ${f.rank_reason}</div>` : '')}
      ${kimchiBanner}
      <div class="price-row">
        <div class="price-cell"><div class="lbl">상장가</div><div class="v">₩${fmtPrice(t.list_price)}</div></div>
        <div class="price-cell"><div class="lbl">현재가</div><div class="v">₩${fmtPrice(t.last_price)}</div></div>
        <div class="price-cell"><div class="lbl">상장比</div><div class="v ${pctCls(t.from_listing)}">${fmtPct(t.from_listing)}</div></div>
        <div class="price-cell"><div class="lbl">ATH比</div><div class="v ${pctCls(t.from_ath)}">${fmtPct(t.from_ath)}</div></div>
      </div>
      <div class="ath-row">
        <span>빗썸 ATH <b>₩${fmtPrice(t.ath)}</b> (${t.ath_day})</span>
        <span>유통률 <b>${f.circ_pct}%</b></span>
      </div>
      ${f.ath_note ? `<div style="padding:6px 16px;font-size:11px;color:var(--orange);border-bottom:1px solid var(--border)">⚠ ${f.ath_note}</div>` : ''}
      <div class="window-row">
        <div class="win-cell"><div class="lbl">7일</div><div class="v ${pctCls(t.w7?.change)}">${fmtPct(t.w7?.change)}</div></div>
        <div class="win-cell"><div class="lbl">14일</div><div class="v ${pctCls(t.w14?.change)}">${fmtPct(t.w14?.change)}</div></div>
        <div class="win-cell"><div class="lbl">30일</div><div class="v ${pctCls(t.w30?.change)}">${fmtPct(t.w30?.change)}</div></div>
      </div>
      <div class="chart-wrap"><div class="chart-box" id="chart-${t.symbol}"></div></div>
      <details>
        <summary>펀더멘털 상세 (토크노믹스/타임라인/로드맵)</summary>
        <div class="fund-section">
          <h4>프로젝트</h4>
          <div class="fund-desc">${f.description || ''}</div>
          <div class="fund-meta">
            <span class="k">최대 공급</span><span>${f.max_supply || '-'}</span>
            <span class="k">베스팅</span><span>${f.vesting || '-'}</span>
            <span class="k">유틸리티</span><span>${f.utility || '-'}</span>
            <span class="k">다음 언락</span><span style="color:var(--orange)">${f.next_unlock || '-'}</span>
          </div>
          <h4>분배 구조 ${f.dist_sum < 100 ? '' : '<span style="color:var(--green);font-size:10px">✓ 100%</span>'}</h4>
          ${distBar(f.distribution)}
          ${distWarn}
          <h4>타임라인</h4>
          <ul class="timeline-list">${tl}</ul>
          <h4>로드맵</h4>
          <ul class="roadmap-list">${rm}</ul>
        </div>
      </details>
      ${flagsHtml ? `<div class="flags">${flagsHtml}</div>` : ''}
      ${sourcesHtml ? `<div class="sources"><b style="color:var(--muted)">출처:</b> ${sourcesHtml}</div>` : ''}
    `;
    grid.appendChild(card);
    attachExpand(card, t.meta_strip);
    requestAnimationFrame(() => {
      const el = document.getElementById('chart-' + t.symbol);
      const chart = LightweightCharts.createChart(el, {
        layout:{background:{color:'#161b22'}, textColor:'#8b949e'},
        grid:{vertLines:{color:'#21262d'}, horzLines:{color:'#21262d'}},
        rightPriceScale:{borderColor:'#30363d'},
        timeScale:{borderColor:'#30363d', timeVisible:false},
        crosshair:{mode:0}, autoSize:true,
      });
      const cs = chart.addCandlestickSeries({
        upColor:'#26a69a', downColor:'#ef5350',
        borderUpColor:'#26a69a', borderDownColor:'#ef5350',
        wickUpColor:'#26a69a', wickDownColor:'#ef5350',
      });
      cs.setData(t.candles);
      const vs = chart.addHistogramSeries({priceFormat:{type:'volume'}, priceScaleId:'vol'});
      vs.priceScale().applyOptions({scaleMargins:{top:0.8, bottom:0}});
      vs.setData(t.volumes);
      chart.timeScale().fitContent();
    });
  });
}

function distBar(dist) {
  if (!dist || dist.length === 0) return '';
  const total = dist.reduce((s, [, p]) => s + p, 0) || 100;
  let bar = `<div class="dist-bar">`;
  let legend = `<div class="dist-legend">`;
  dist.forEach(([name, pct], i) => {
    const c = DIST_COLORS[i % DIST_COLORS.length];
    const width = (pct / total * 100).toFixed(2);
    bar += `<div class="dist-seg" style="width:${width}%;background:${c}" title="${name} ${pct}%">${pct >= 10 ? pct + '%' : ''}</div>`;
    legend += `<div class="leg"><span class="sw" style="background:${c}"></span>${name} ${pct}%</div>`;
  });
  bar += `</div>`;
  legend += `</div>`;
  return bar + legend;
}

document.querySelectorAll('.controls button[data-sort]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button[data-sort]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.sort);
  });
});
document.querySelectorAll('.filter-tag').forEach(tag => {
  tag.addEventListener('click', () => {
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    currentFilter = tag.dataset.filter;
    const sortBtn = document.querySelector('.controls button.active');
    renderCards(sortBtn ? sortBtn.dataset.sort : 'rank');
  });
});

renderCompareTable();
renderCards('rank');

const FMT_USD = new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',notation:'compact',maximumFractionDigits:1});
const FMT_NUM = new Intl.NumberFormat('en-US',{notation:'compact',maximumFractionDigits:1});

function shortAddr(a){ return a && a.length > 10 ? a.slice(0,6) + '...' + a.slice(-4) : (a||''); }

function catLabel(c){
  if (c === 'derivative_assumed') return '선물 추정';
  if (c === 'spot_assumed') return '현물 추정';
  return '구분 불명';
}

function renderCexPanel(meta){
  const list = meta.cex_tickers_top5 || [];
  if (list.length === 0) return '<div class="empty">CEX 데이터 없음</div>';
  const rows = list.map(t => {
    const cat = t.category || 'unknown';
    const vol = t.volume_usd != null ? '$' + FMT_USD.format(t.volume_usd).replace('$','') : '-';
    const price = t.last_usd != null ? '$' + Number(t.last_usd).toPrecision(4) : '-';
    return `<tr><td>${t.market||'-'}</td><td>${t.pair||'-'}</td><td><span class="cat-${cat}">${catLabel(cat)}</span></td><td>${price}</td><td>${vol}</td></tr>`;
  }).join('');
  return `<div class="ep-title">CEX 상위 5 (거래량 순) — 현물/선물 추정 라벨</div>
    <table><thead><tr><th>거래소</th><th>거래쌍</th><th>유형</th><th>가격</th><th>24h 거래량</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="note">⚠ 현물/선물은 거래쌍 패턴/거래소 ID 기반 추정. 단정 분류 아님</div>`;
}

function renderContractPanel(meta){
  const list = meta.contracts || [];
  if (list.length === 0) return '<div class="empty">컨트랙트 데이터 없음 (자체 메인넷 또는 미공개)</div>';
  const rows = list.map(c => {
    const display = c.chain_display || c.chain || '-';
    const addr = c.address || '';
    const link = c.explorer_url ? `<a href="${safeUrl(c.explorer_url)}" target="_blank" rel="noopener noreferrer">${esc(shortAddr(addr))}↗</a>` : esc(shortAddr(addr));
    return `<tr><td>${display}</td><td>${link}</td><td><code style="font-size:10px;color:var(--muted)">${addr}</code></td></tr>`;
  }).join('');
  return `<div class="ep-title">컨트랙트 (체인별)</div>
    <table><thead><tr><th>체인</th><th>Explorer</th><th>주소</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderDexPanel(meta){
  const liq = meta.dex_liquidity_usd;
  const pool = meta.dex_top_pool;
  const note = meta.dex_note;
  if (note) return `<div class="ep-title">DEX 유동성</div><div class="note">⚠ ${note}</div>`;
  if (liq == null) return '<div class="empty">DEX 데이터 없음 (DEX Screener 미지원 체인 또는 유동성 부재)</div>';
  const usd = '$' + FMT_USD.format(liq).replace('$','');
  const link = pool ? `<a href="https://dexscreener.com/search?q=${pool}" target="_blank" rel="noopener noreferrer">DEX Screener 풀 ${shortAddr(pool)}↗</a>` : '';
  return `<div class="ep-title">DEX 유동성 (DEX Screener 최대 풀)</div>
    <table><tr><td>총 유동성</td><td><b>${usd}</b></td></tr><tr><td>풀 주소</td><td>${link}</td></tr></table>`;
}

function attachExpand(card, meta){
  if (!meta) return;
  const cells = card.querySelectorAll('.meta-strip .meta-cell.expandable');
  let panel = null;
  cells.forEach(cell => {
    cell.setAttribute('role', 'button');
    cell.setAttribute('tabindex', '0');
    cell.setAttribute('aria-expanded', 'false');
    const handler = () => {
      const key = cell.dataset.key;
      const wasExpanded = cell.getAttribute('aria-expanded') === 'true';
      cells.forEach(c => c.setAttribute('aria-expanded', 'false'));
      if (panel) { panel.remove(); panel = null; }
      if (!wasExpanded) {
        cell.setAttribute('aria-expanded', 'true');
        panel = document.createElement('div');
        panel.className = 'expand-panel';
        if (key === 'cex') panel.innerHTML = renderCexPanel(meta);
        else if (key === 'contract') panel.innerHTML = renderContractPanel(meta);
        else if (key === 'dex') panel.innerHTML = renderDexPanel(meta);
        card.querySelector('.meta-strip').insertAdjacentElement('afterend', panel);
      }
    };
    cell.addEventListener('click', handler);
    cell.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); } });
  });
}
